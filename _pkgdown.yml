url: https://review.dataobservatory.eu/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Roboto"}
    heading_font: {google: "Roboto Slab"}
    code_font: {google: "JetBrains Mono"}

home:
  links:
    - text: Website
      href: https://review.dataobservatory.eu/
    - text: GitHub
      href: https://github.com/dataobservatory-eu/review

authors:
  Daniel Antal:
    href: https://reprex.nl/authors/daniel_antal/
  Reprex:
    href: https://reprex.nl/
    html: >
      <img src="https://reprex.nl/authors/admin/avatar_hud66277e7f64fbf44513e7a4881e2a94f_35557_270x270_fill_lanczos_center_2.png"
      height="24" />

articles:

  - title: "Getting Started"
    desc: >
      An introduction into the extension of tidyverse with a review algebra
      based on four verbs.
    contents:
      - intro

  - title: "Provenance"
    desc: >
      How to use the dual algebra to create vectorised semantic statements
      about the provenance of transitions happening in a tidy review pipeline.
    contents:
      - prov

  - title: "Dual Algebra"
    desc: >
      Combination of tidyverse and review and outlook to potential inference
      use cases.
    contents:
      - tidyverse

reference:

  - title: "Review Workflow"
    desc: >
      Create reviewable claims, allocate review rounds,
      document provenance, and finalise reviewed values.
    contents:
      - claims_df
      - review
      - explain
      - finalise_review

  - title: "Data and Metadata"
    desc: "Metadata crosswalk with standard vocabularies and schemas."
    contents:
      - review_activity_crosswalk
